<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Line Batch Organizer</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: linear-gradient(135deg, #6e2dc0, #f44336);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      padding: 30px 40px;
      border-radius: 20px;
      max-width: 1300px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    h2 {
      font-weight: 300;
      font-size: 26px;
      margin-bottom: 6px;
      text-align: center;
      color: #333;
    }

    /* ── MBR lookup bar ── */
    .mbr-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(110,45,192,0.08), rgba(244,67,54,0.06));
      border: 1.5px solid #b39ddb;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .mbr-bar label {
      font-size: 13px;
      font-weight: 600;
      color: #6e2dc0;
      white-space: nowrap;
    }
    #combinedInput {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      width: 90px;
      padding: 8px 12px;
      border: 2px solid #b39ddb;
      border-radius: 8px;
      color: #6e2dc0;
      text-align: center;
    }
    #combinedInput:focus {
      border-color: #6e2dc0;
      box-shadow: 0 0 0 3px rgba(110,45,192,0.2);
      outline: none;
    }
    #mbrStatus {
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    #mbrStatus.found   { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
    #mbrStatus.notfound{ background:#ffebee; color:#c62828; border:1px solid #ef9a9a; }
    #mbrStatus.multi   { background:#fff8e1; color:#f57f17; border:1px solid #ffe082; }
    #mbrStatus.empty   { background:#f3f4f6; color:#9e9e9e; border:1px solid #e0e0e0; }

    /* machine chips when multiple options */
    #machineChips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: 4px;
    }
    .machine-chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 2px solid #b39ddb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #6e2dc0;
      transition: all 0.15s;
    }
    .machine-chip:hover  { background: #ede7f6; border-color: #6e2dc0; }
    .machine-chip.active { background: #6e2dc0; color: #fff; border-color: #6e2dc0; }

    /* auto-filled field highlight */
    .autofilled {
      border: 2px solid #6e2dc0 !important;
      background: #f3e8ff !important;
    }

    /* ── main form ── */
    .row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .field { flex: 1; min-width: 100px; }
    .field.small { flex: 0 0 150px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
    }
    input, select, textarea {
      padding: 10px 12px;
      font-size: 15px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      transition: all 0.2s ease;
      margin-bottom: 5px;
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #6e2dc0;
      box-shadow: 0 0 0 3px rgba(110,45,192,0.2);
      outline: none;
    }
    input.invalid, select.invalid, textarea.invalid {
      border: 2px solid #e53935;
      background-color: #ffebee;
    }
    input.valid, select.valid, textarea.valid {
      border: 2px solid #43a047;
      background-color: #e8f5e9;
    }

    /* toggle */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .toggle-label { font-size: 14px; color: #555; }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity:0; width:0; height:0; margin:0; padding:0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top:0; left:0; right:0; bottom:0;
      background-color: #6e2dc0;
      border-radius: 28px;
      transition: background 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 20px; width: 20px;
      left: 4px; bottom: 4px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background-color: #f44336; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
    .toggle-badge { font-size:15px; font-weight:700; color:#6e2dc0; min-width:18px; transition: color 0.3s; }
    .toggle-badge.two { color:#f44336; }

    /* preview */
    #previewRow {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    #preview {
      font-weight: 500;
      font-size: 15px;
      line-height: 1.7;
      padding: 20px;
      background-color: #f4f6fa;
      border-radius: 10px;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
    }
    #lotDisplay {
      font-weight: 600;
      font-size: 20px;
      color: #6e2dc0;
      background-color: #f4f0ff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    #lotDisplay:hover { background-color: #e9dfff; }
    #lotDisplaySub {
      font-size: 12px;
      font-weight: 400;
      color: #9e9e9e;
    }
    #copyNotice {
      font-size: 14px;
      color: green;
      display: none;
      margin-top: 4px;
    }
    #list {
      width: 100%;
      height: 200px;
      margin-top: 20px;
      font-family: monospace;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background-color: #fafafa;
      white-space: pre;
      box-sizing: border-box;
    }
    button {
      padding: 10px 18px;
      margin: 10px 8px 10px 0;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      color: white;
      background: linear-gradient(135deg, #6e2dc0, #8a4fff);
      cursor: pointer;
      transition: transform 0.15s, background 0.3s, box-shadow 0.3s;
    }
    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #5a24a4, #7533d4);
    }
    #reorderButton.active {
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      box-shadow: 0 0 10px rgba(76,175,80,0.6);
    }
    .readonly-styled {
      background: #f3e8ff !important;
      border: 1.5px solid #b39ddb !important;
      color: #4a148c !important;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Line Batch Organizer</h2>

  <!-- ── MBR LOOKUP ── -->
  <div class="mbr-bar">
    <label>🔍 MBR Combined Code:</label>
    <input type="text" id="combinedInput" maxlength="3" placeholder="FAI" autocomplete="off" spellcheck="false">
    <span id="mbrStatus" class="empty">Enter 3-letter code</span>
    <div id="machineChips"></div>
  </div>

  <form id="lotForm" onsubmit="event.preventDefault(); addToList();">
    <div class="row">
      <div class="field small">
        <label for="prefix">Prefix <span style="font-size:11px;color:#9e9e9e">(auto from MBR)</span></label>
        <input type="text" id="prefix" maxlength="3" placeholder="e.g. FAI" tabindex="1">
      </div>
      <div class="field">
        <label for="body">Body (auto-filled by calendar)</label>
        <input type="text" id="body" placeholder="mmddyy1" tabindex="2" readonly>
        <input type="date" id="calendar">
        <div class="toggle-wrapper" style="margin-top:8px;">
          <span class="toggle-label">Batch suffix:</span>
          <span class="toggle-badge" id="suffixLabel1">1</span>
          <label class="toggle-switch">
            <input type="checkbox" id="suffixToggle">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-badge two" id="suffixLabel2">2</span>
        </div>
      </div>
      <div class="field small">
        <label for="expiration">Exp. (Months)</label>
        <input type="text" id="expiration" maxlength="3" placeholder="MM" tabindex="3">
        <button type="button" onclick="convertExpiration()">Convert</button>
        <input type="text" id="convertedExp" placeholder="YYYY-MM-DD" readonly>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="machine">Machine</label>
        <select id="machine" tabindex="4">
          <option value="">--Select--</option>
          <option value="BAM1">BAM1</option>
          <option value="BAM2">BAM2</option>
          <option value="BR01">BR01</option>
          <option value="ESS1">ESS1</option>
          <option value="MFT1">MFT1</option>
          <option value="HS01">HS01</option>
          <option value="HS02">HS02</option>
          <option value="HS03">HS03</option>
          <option value="HS04">HS04</option>
          <option value="HSMA">HSMA</option>
          <option value="HSMB">HSMB</option>
          <option value="HSMC">HSMC</option>
          <option value="PA01">PA01</option>
          <option value="Welders">Welders</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="productName">Product Name</label>
        <input type="text" id="productName" placeholder="Enter product name">
      </div>
      <div class="field">
        <label for="wip">WIP</label>
        <input type="text" id="wip" placeholder="Enter WIP">
        <input type="text" id="wipConfirm" placeholder="Re-enter WIP">
      </div>
      <div class="field">
        <label for="productNum">Product # (SAP)</label>
        <input type="text" id="productNum" placeholder="Enter product number">
        <input type="text" id="productNumConfirm" placeholder="Re-enter product number">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="color">Color</label>
        <select id="color">
          <option value="">--Select Color--</option>
          <option value="Orange">Orange</option>
          <option value="Purple">Purple</option>
          <option value="Yellow">Yellow</option>
        </select>
      </div>
      <div class="field small">
        <label for="colorAmount">Placard Amount</label>
        <input type="number" id="colorAmount" placeholder="Qty">
      </div>

    </div>

    <div class="row">
      <div class="field small">
        <label for="controlledDoc">Controlled Document?</label>
        <select id="controlledDoc">
          <option value="">--Select--</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
    </div>

    <div id="previewRow">
      <span id="preview"></span>
      <span id="lotDisplay" title="Click to copy LOT #">
        <span id="lotDisplayMain"></span>
        <span id="lotDisplaySub">click to copy</span>
      </span>
    </div>

    <div id="copyNotice">✔ Copied!</div>
    <button type="submit">Add to List</button>
    <button type="button" onclick="copyList()">Copy All</button>
    <button id="reorderButton" type="button" onclick="reorderList()">Placard Order</button>
    <button type="button" onclick="clearAll()" style="background:linear-gradient(135deg,#e53935,#ef5350)">Clear Form</button>
  </form>

  <textarea id="list" placeholder="Your added lots will appear here..."></textarea>
</div>

// ──────────────────────────────────────────────
//  BUILD LOOKUP INDEX
// ──────────────────────────────────────────────
// byCode[combined] = array of rows (one per unique machine)
const byCode = {};
for (const r of MBR_DATA) {
  if (!byCode[r.Combined]) byCode[r.Combined] = [];
  // Deduplicate by machine
  if (!byCode[r.Combined].some(x => x.Machine === r.Machine)) {
    byCode[r.Combined].push(r);
  }
}

// ──────────────────────────────────────────────
//  DOM REFS
// ──────────────────────────────────────────────
const combinedInput    = document.getElementById('combinedInput');
const mbrStatus        = document.getElementById('mbrStatus');
const machineChips     = document.getElementById('machineChips');
const prefixInput      = document.getElementById('prefix');
const bodyInput        = document.getElementById('body');
const machineSelect    = document.getElementById('machine');
const expirationInput  = document.getElementById('expiration');
const convertedExpInput= document.getElementById('convertedExp');
const previewDiv       = document.getElementById('preview');
const lotDisplayMain   = document.getElementById('lotDisplayMain');
const copyNotice       = document.getElementById('copyNotice');
const listTextarea     = document.getElementById('list');
const calendarInput    = document.getElementById('calendar');
const controlledDocSelect = document.getElementById('controlledDoc');
const productNameInput = document.getElementById('productName');
const wipInput         = document.getElementById('wip');
const wipConfirmInput  = document.getElementById('wipConfirm');
const productNumInput  = document.getElementById('productNum');
const productNumConfirmInput = document.getElementById('productNumConfirm');
const colorSelect      = document.getElementById('color');
const colorAmountInput = document.getElementById('colorAmount');
const reorderButton    = document.getElementById('reorderButton');
const suffixToggle     = document.getElementById('suffixToggle');

let isReordered = false;
let originalList = '';
let activeMbrRow = null; // currently selected MBR row

// ──────────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────────
function parsePlacard(placard) {
  if (!placard || placard === 'N/A') return { color: '', amount: '' };
  const p = placard.toUpperCase();
  let color = '';
  if (p.includes('PURPLE')) color = 'Purple';
  else if (p.includes('ORANGE')) color = 'Orange';
  else if (p.includes('YELLOW')) color = 'Yellow';
  const match = placard.match(/\((\d+)\)/);
  const amount = match ? match[1] : '';
  return { color, amount };
}

function setAutoFill(el, value) {
  el.value = value;
  el.classList.add('autofilled');
  setTimeout(() => el.classList.remove('autofilled'), 1800);
}

function clearAutoFields() {
  [productNameInput, wipInput, wipConfirmInput, productNumInput, productNumConfirmInput,
   expirationInput, colorAmountInput].forEach(el => el.value = '');
  colorSelect.value = '';
  machineSelect.value = '';
  activeMbrRow = null;
}

// ──────────────────────────────────────────────
//  FILL FROM A SPECIFIC MBR ROW
// ──────────────────────────────────────────────
function applyMbrRow(row) {
  activeMbrRow = row;

  // Prefix = Combined code
  prefixInput.value = row.Combined;

  // Machine
  machineSelect.value = row.Machine;
  setAutoFill(machineSelect, row.Machine);

  // Product Name
  setAutoFill(productNameInput, row['Item Name'] || '');

  // WIP (both fields)
  const wip = row.WIP === 'N/A' ? '' : row.WIP;
  setAutoFill(wipInput, wip);
  setAutoFill(wipConfirmInput, wip);

  // Product # / SAP
  const sap = row['SAP #'] === 'N/A' ? '' : row['SAP #'];
  setAutoFill(productNumInput, sap);
  setAutoFill(productNumConfirmInput, sap);

  // Expiration months
  const expMo = row['EXPIRATION (MONTHS)'] || '';
  setAutoFill(expirationInput, expMo);

  // Placard color + amount
  const { color, amount } = parsePlacard(row.Placards);
  colorSelect.value = color;
  setAutoFill(colorAmountInput, amount);

  // Auto-convert expiration if date is already set
  if (calendarInput.value && expMo) convertExpiration();

  updatePreview();
  validateFields();
}

// ──────────────────────────────────────────────
//  MBR LOOKUP LOGIC
// ──────────────────────────────────────────────
combinedInput.addEventListener('input', function () {
  const code = this.value.trim().toUpperCase();
  this.value = code;
  machineChips.innerHTML = '';

  if (code.length < 3) {
    mbrStatus.className = 'empty';
    mbrStatus.textContent = code.length === 0 ? 'Enter 3-letter code' : `${3 - code.length} more letter(s)…`;
    clearAutoFields();
    prefixInput.value = '';
    updatePreview();
    return;
  }

  const matches = byCode[code];
  if (!matches) {
    mbrStatus.className = 'notfound';
    mbrStatus.textContent = `"${code}" not found in MBR`;
    clearAutoFields();
    prefixInput.value = code;
    updatePreview();
    return;
  }

  prefixInput.value = code;

  if (matches.length === 1) {
    mbrStatus.className = 'found';
    mbrStatus.textContent = `✔ ${matches[0]['Item Name']} — ${matches[0].Machine}`;
    applyMbrRow(matches[0]);
  } else {
    // Multiple machines — show chips
    mbrStatus.className = 'multi';
    mbrStatus.textContent = `${matches.length} machines — pick one:`;
    matches.forEach(row => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'machine-chip';
      chip.textContent = row.Machine;
      chip.title = `${row.Placards}  |  Labels: ${row.Labels}`;
      chip.addEventListener('click', () => {
        document.querySelectorAll('.machine-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        mbrStatus.className = 'found';
        mbrStatus.textContent = `✔ ${row['Item Name']} — ${row.Machine}`;
        applyMbrRow(row);
      });
      machineChips.appendChild(chip);
    });
    // Auto-apply first and highlight it
    applyMbrRow(matches[0]);
    machineChips.firstChild.classList.add('active');
  }
});

// ──────────────────────────────────────────────
//  DATE / EXPIRATION
// ──────────────────────────────────────────────
function getBatchSuffix() { return suffixToggle.checked ? '2' : '1'; }

function formatDateToMMDDYY(dateStr) {
  const [year, month, day] = dateStr.split('-');
  return `${month.padStart(2,'0')}${day.padStart(2,'0')}${year.slice(-2)}`;
}

function updateBodyField() {
  if (calendarInput.value) {
    bodyInput.value = formatDateToMMDDYY(calendarInput.value) + getBatchSuffix();
    updatePreview();
    // Auto-convert if expiration months already filled
    if (expirationInput.value) convertExpiration();
  }
}

calendarInput.addEventListener('change', updateBodyField);
suffixToggle.addEventListener('change', updateBodyField);

function convertExpiration() {
  const calendarValue = calendarInput.value;
  const monthsToAdd = parseInt(expirationInput.value, 10);
  if (!calendarValue || isNaN(monthsToAdd)) return;
  const [year, month, day] = calendarValue.split('-').map(Number);
  const baseDate = new Date(year, month - 1, day);
  const originalDay = baseDate.getDate();
  baseDate.setMonth(baseDate.getMonth() + monthsToAdd);
  if (baseDate.getDate() < originalDay) baseDate.setDate(0);
  const yyyy = baseDate.getFullYear();
  const mm = String(baseDate.getMonth() + 1).padStart(2, '0');
  const dd = String(baseDate.getDate()).padStart(2, '0');
  convertedExpInput.value = `${yyyy}-${mm}-${dd}`;
  updatePreview();
}

// ──────────────────────────────────────────────
//  PREVIEW
// ──────────────────────────────────────────────
function getLotData() {
  const rawPrefix  = prefixInput.value.trim().toUpperCase();
  const body       = bodyInput.value.trim();
  const expiration = convertedExpInput.value.trim();
  const expMonths  = expirationInput.value.trim();
  const cd         = controlledDocSelect.value;
  const prefixMain = rawPrefix.substring(0, 2);
  const suffixFromPrefix = rawPrefix.length >= 3 ? rawPrefix.charAt(2) : '';
  const lot        = `${prefixMain}${body}${suffixFromPrefix}`;
  const machine    = machineSelect.value;
  const productName= productNameInput.value.trim();
  const wip        = wipInput.value.trim();
  const productNum = productNumInput.value.trim();
  const color      = colorSelect.value.trim();
  const colorAmount= colorAmountInput.value.trim();
  const lotDate    = calendarInput.value || '';
  return { lot, machine, expiration, expMonths, cd, productName, wip, productNum, color, colorAmount, lotDate };
}

function updatePreview() {
  const d = getLotData();
  if (d.lot && d.lot.length > 4 && d.machine) {
    previewDiv.textContent =
      `LOT: ${d.lot}\n` +
      `Machine: ${d.machine}    Exp: ${d.expMonths ? d.expMonths+'mo' : '—'}    ${d.expiration || '—'}\n` +
      `Product: ${d.productName || '—'}    WIP: ${d.wip || '—'}    SAP: ${d.productNum || '—'}\n` +
      `Color: ${d.color || '—'}    Placards: ${d.colorAmount || '—'}\n` +
      `Controlled Doc: ${d.cd || '—'}`;
    lotDisplayMain.textContent = `LOT #: ${d.lot}`;
  } else {
    previewDiv.textContent = '';
    lotDisplayMain.textContent = '';
  }
}

// ──────────────────────────────────────────────
//  ADD TO LIST
// ──────────────────────────────────────────────
function addToList() {
  const d = getLotData();

  if (wipInput.value.trim() !== wipConfirmInput.value.trim()) {
    alert('WIP entries do not match.'); return;
  }
  if (productNumInput.value.trim() !== productNumConfirmInput.value.trim()) {
    alert('Product # entries do not match.'); return;
  }
  if (!d.lot || d.lot.length < 5) {
    alert('Please enter a valid prefix and select a date.'); return;
  }

  listTextarea.value +=
    `${d.lot}\t${d.machine}\tExp: ${d.expMonths}mo\t${d.expiration}\t${d.cd}\t${d.productName}\t${d.wip}\t${d.productNum}\t${d.color}\t${d.colorAmount}\t${d.lotDate}\n`;

  previewDiv.textContent = '✔️ Added to list';
  lotDisplayMain.textContent = '';
  combinedInput.value = '';
  mbrStatus.className = 'empty';
  mbrStatus.textContent = 'Enter 3-letter code';
  machineChips.innerHTML = '';
  clearAutoFields();
  prefixInput.value = '';
  convertedExpInput.value = '';
  controlledDocSelect.value = '';
  validateFields();
}

// ──────────────────────────────────────────────
//  COPY / REORDER / CLEAR
// ──────────────────────────────────────────────
function copyList() {
  listTextarea.select();
  document.execCommand('copy');
}

function reorderList() {
  if (!isReordered) {
    originalList = listTextarea.value.trim();
    if (!originalList) return;
    const lines = originalList.split('\n');
    const reordered = lines.map(line => {
      const p = line.split('\t');
      const lot=p[0]||'', expMo=p[2]||'', expDate=p[3]||'', productName=p[5]||'',
            wip=p[6]||'', productNum=p[7]||'', color=p[8]||'', colorAmt=p[9]||'',
            lotDate=p[10]||'';
      return `${productName}\t${wip}\t${productNum}\t${lot}\t${expDate}\t${expMo}\t${color}\t${colorAmt}\t${lotDate}`;
    });
    listTextarea.value = reordered.join('\n');
    isReordered = true;
    reorderButton.textContent = 'Restore Original Order';
    reorderButton.classList.add('active');
  } else {
    listTextarea.value = originalList;
    isReordered = false;
    reorderButton.textContent = 'Placard Order';
    reorderButton.classList.remove('active');
  }
}

function clearAll() {
  combinedInput.value = '';
  mbrStatus.className = 'empty';
  mbrStatus.textContent = 'Enter 3-letter code';
  machineChips.innerHTML = '';
  clearAutoFields();
  prefixInput.value = '';
  bodyInput.value = '';
  calendarInput.value = '';
  expirationInput.value = '';
  convertedExpInput.value = '';
  controlledDocSelect.value = '';
  previewDiv.textContent = '';
  lotDisplayMain.textContent = '';
  validateFields();
}

// ──────────────────────────────────────────────
//  LOT DISPLAY COPY
// ──────────────────────────────────────────────
document.getElementById('lotDisplay').addEventListener('click', () => {
  const text = lotDisplayMain.textContent.trim();
  if (text) {
    navigator.clipboard.writeText(text).then(() => {
      copyNotice.style.display = 'block';
      setTimeout(() => copyNotice.style.display = 'none', 1200);
    });
  }
});

// ──────────────────────────────────────────────
//  VALIDATION
// ──────────────────────────────────────────────
function validateFields() {
  document.querySelectorAll('input, select, textarea').forEach(el => {
    if (el.hasAttribute('readonly') || el.type === 'checkbox' || el.type === 'date') return;
    if (!el.value.trim()) {
      el.classList.add('invalid'); el.classList.remove('valid');
    } else {
      el.classList.add('valid'); el.classList.remove('invalid');
    }
  });
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => { updatePreview(); validateFields(); });
  el.addEventListener('change', () => { updatePreview(); validateFields(); });
});

validateFields();
updatePreview();
</script>
